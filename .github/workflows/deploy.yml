name: Deploy Portfolio

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail

            BRANCH="${{ github.ref_name }}"
            APP_DIR="/home/janmejay/code/janmejay-portfolio"
            STACK_DIR="/home/janmejay/docker"

            echo "Deploying branch: ${BRANCH}"
            cd "${APP_DIR}"

            git fetch origin "${BRANCH}"

            if git show-ref --verify --quiet "refs/heads/${BRANCH}"; then
              git checkout "${BRANCH}"
            else
              git checkout -b "${BRANCH}" "origin/${BRANCH}"
            fi

            git pull --ff-only origin "${BRANCH}"

            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif sudo -n docker compose version >/dev/null 2>&1; then
              DC="sudo docker compose"
            else
              echo "Docker Compose is unavailable for the deploy user."
              echo "Add the user to the docker group, or allow passwordless sudo for docker compose."
              exit 1
            fi

            cd "${STACK_DIR}"
            ${DC} up -d --build janmejay-portfolio
            ${DC} ps janmejay-portfolio
